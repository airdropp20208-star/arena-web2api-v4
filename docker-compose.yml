# arena-web2api — Docker Compose
#
#   docker compose up -d --build
#   docker compose logs -f
#   docker compose down
#
# Đặt cookie trong .env (hoặc export trước khi up).
services:
  arena-web2api:
    build: .
    image: arena-web2api:latest
    container_name: arena-web2api
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=8000
    volumes:
      # persist conversations + cấu hình
      - ./data:/app/data
      - ./.env:/app/.env:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
